version: "1.0"
service: "event-router-service"
description: "Incident severity policy for live policy-governed ingress."

severities:
  P0:
    definition: "Critical risk to capital safety or trust boundary."
    triggers:
      - "proof verification failed in critical execution chain"
      - "guardrails bypass detected"
      - "unauthorized financial action accepted"
    sla:
      ack_minutes: 5
      mitigate_minutes: 30
      update_minutes: 15
    required_actions:
      - "freeze dependent high-risk intents"
      - "open incident channel and notify ops/security"
      - "preserve immutable evidence bundle"
  P1:
    definition: "Major degradation impacting governed execution guarantees."
    triggers:
      - "circuit breaker open on production traffic"
      - "dispatch_failed spike above threshold"
      - "persistent auth/replay anomalies"
    sla:
      ack_minutes: 15
      mitigate_minutes: 120
      update_minutes: 30
    required_actions:
      - "degrade to safe mode"
      - "activate rollback/runbook"
      - "publish impact summary with event_ids"
  P2:
    definition: "Policy degradation with contained blast radius."
    triggers:
      - "slippage guardrail breach"
      - "proof timeout or anchor timeout above baseline"
      - "review queue growth beyond policy budget"
    sla:
      ack_minutes: 60
      mitigate_minutes: 480
      update_minutes: 120
    required_actions:
      - "open tracked issue"
      - "add compensating policy if needed"
      - "validate via targeted e2e"
  P3:
    definition: "Operational drift, non-critical inconsistencies, or documentation debt."
    triggers:
      - "thesis vs pitch drift"
      - "claims without evidence"
      - "non-blocking metric regressions"
    sla:
      ack_minutes: 240
      mitigate_minutes: 1440
      update_minutes: 480
    required_actions:
      - "queue for governance review"
      - "run spec lint and dossier recompile"

classification_rules:
  - if: "any(P0 trigger)"
    severity: "P0"
  - if: "circuit_open_count >= 1 OR dispatch_failed_rate >= 0.05"
    severity: "P1"
  - if: "guardrail_violation_count baseline breach"
    severity: "P2"
  - if: "documentation or claim drift only"
    severity: "P3"

essential_evidence:
  - "event_id"
  - "event_type"
  - "decision"
  - "proof_status"
  - "reason_codes"
  - "router and trigger logs"
