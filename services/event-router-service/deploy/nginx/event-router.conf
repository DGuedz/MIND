upstream mind_event_router_upstream {
    server 127.0.0.1:3016;
    keepalive 64;
}

server {
    listen 80;
    server_name event-router.local;

    client_max_body_size 512k;
    proxy_read_timeout 10s;
    proxy_send_timeout 10s;

    location /v1/health {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://mind_event_router_upstream;
    }

    location /v1/events {
        limit_except POST { deny all; }

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Authentication token is passed through to application guardrails.
        proxy_set_header x-event-router-token $http_x_event_router_token;
        proxy_pass http://mind_event_router_upstream;
    }
}
