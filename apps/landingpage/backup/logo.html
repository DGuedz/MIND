<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND Logo Visualization</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: #050505;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: white;
  }
  .logo-container {
    width: 600px;
    height: 600px;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
  }
  .logo-text {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 52px;
    font-weight: 300;
    fill: #ffffff;
    letter-spacing: 0.35em;
    text-anchor: middle;
    dominant-baseline: central;
  }
</style>
</head>
<body>

<div class="logo-container">
  <svg viewBox="0 0 800 800" id="mind-logo"></svg>
</div>

<script>
  const svg = document.getElementById('mind-logo');
  const cx = 400;
  const cy = 400;
  const numLines = 32; // Dense lines
  const maxRadius = 240;

  let svgContent = '';

  // 1. Define the mask to hide lines behind the text
  svgContent += `
    <defs>
      <mask id="text-mask">
        <!-- Everything white is visible -->
        <rect x="0" y="0" width="800" height="800" fill="white" />
        
        <!-- The area to hide (the text area) -->
        <rect x="220" y="340" width="380" height="80" rx="40" fill="black" />
      </mask>
      
      <!-- Subtle glow for the lines -->
      <filter id="glow">
        <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
  `;

  // 2. Draw the concentric lines with the mask applied
  svgContent += `<g mask="url(#text-mask)" fill="none" stroke="#e0e0e0" stroke-width="2.5" opacity="0.9">`;

  for (let i = 1; i <= numLines; i++) {
    const progress = i / numLines;
    const r = progress * maxRadius;
    
    // We'll build a path by sampling points around an organic head/fingerprint shape
    const numPoints = 120;
    let pathD = '';

    for (let j = 0; j <= numPoints; j++) {
      const angle = (j / numPoints) * Math.PI * 2;
      
      // Base circle
      let x = Math.cos(angle) * r;
      let y = Math.sin(angle) * r;
      
      // Distort into a head shape
      // - Stretch vertically (make it an oval)
      y *= 1.3;
      
      // - Pinch the bottom half to create a jaw/neck
      if (y > 0) {
        // As y goes down, pinch x inwards
        const pinchFactor = Math.max(0.6, 1 - (y / (maxRadius * 1.3)) * 0.4);
        x *= pinchFactor;
      }
      
      // - Bulge the top slightly to make a cranium
      if (y < 0) {
        const bulgeFactor = 1 + Math.abs(y / (maxRadius * 1.3)) * 0.1;
        x *= bulgeFactor;
      }
      
      // Add slight offset for the "fingerprint" irregularity, especially at the bottom
      const noise = Math.sin(angle * 6) * (progress * 2) * (y > 0 ? 1.5 : 0.5);
      
      const finalX = cx + x;
      const finalY = cy + y + noise;

      if (j === 0) {
        pathD += `M ${finalX} ${finalY} `;
      } else {
        pathD += `L ${finalX} ${finalY} `;
      }
    }
    
    // Close path
    pathD += 'Z';
    
    // Add varying opacity/stroke-width to mimic the reference image's depth
    const strokeWidth = 1.5 + (1 - progress) * 2;
    const opacity = 0.5 + progress * 0.5;

    svgContent += `<path d="${pathD}" stroke-width="${strokeWidth}" opacity="${opacity}" />`;
  }

  svgContent += `</g>`;

  // 3. Draw the center dot/keyhole
  // Located just below the center text
  svgContent += `
    <g transform="translate(0, 25)">
      <circle cx="400" cy="420" r="5" fill="#ffffff" filter="url(#glow)" />
      <path d="M 398 410 L 402 410 L 401 420 L 399 420 Z" fill="#ffffff" />
    </g>
  `;

  // 4. Draw the MIND text in the center
  svgContent += `
    <text x="410" y="380" class="logo-text" filter="url(#glow)">MIND</text>
  `;

  svg.innerHTML = svgContent;
</script>
</body>
</html>
