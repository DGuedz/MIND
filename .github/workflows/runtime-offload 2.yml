name: runtime-offload

on:
  push:
    branches: ["main"]
    paths:
      - "artifacts/**"
      - "logs/**"
      - "failed_event_spool/**"
      - "governance/spec_runtime/**"
      - ".github/workflows/runtime-offload.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  offload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build cloud bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime-offload
          for dir in artifacts logs failed_event_spool governance/spec_runtime; do
            if [ -d "$dir" ]; then
              mkdir -p ".runtime-offload/$dir"
              cp -R "$dir"/. ".runtime-offload/$dir/" || true
            fi
          done

      - name: Upload runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-offload-${{ github.run_id }}
          path: .runtime-offload
          retention-days: 14
