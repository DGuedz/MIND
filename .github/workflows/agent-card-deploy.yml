name: Deploy Agent Card to Marketplace

on:
  push:
    branches: [ main, master ]
    paths:
      - 'agent-card.json'
      - 'products/**'
      - 'specs/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'agent-card.json'
      - 'products/**'
      - 'specs/**'
  schedule:
    - cron: '0 0 * * *' # Daily auto-refresh
  workflow_dispatch: # Manual trigger

jobs:
  deploy-agent-card:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install MIND CLI
      run: |
        npm install -g @mindprotocol/cli
        mind --version

    - name: Validate Agent Card
      run: |
        mind validate agent-card.json
        echo "✅ Agent Card validation passed"

    - name: Deploy to MIND Discovery Network
      run: |
        mind deploy --card agent-card.json --api-key ${{ secrets.MIND_API_KEY }}
        echo "🚀 Agent Card deployed to MIND Discovery Network"

    - name: Update GitHub Discovery Index
      run: |
        mind index --repo ${{ github.repository }} --branch ${{ github.ref_name }}
        echo "📊 GitHub discovery index updated"

    - name: Notify MIND Marketplace
      run: |
        curl -X POST "https://api.mindprotocol.ai/webhooks/github" \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.MIND_API_KEY }}" \
          -d '{
            "event": "agent_card_updated",
            "repository": "${{ github.repository }}",
            "commit": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "actor": "${{ github.actor }}"
          }'
        echo "🔔 MIND Marketplace notified of update"

    - name: Generate Discovery Metrics
      run: |
        mind metrics --output discovery-metrics.json
        echo "📈 Discovery metrics generated"

    - name: Upload Metrics Artifact
      uses: actions/upload-artifact@v4
      with:
        name: discovery-metrics
        path: discovery-metrics.json

    - name: Update README with Stats
      run: |
        mind update-readme --metrics discovery-metrics.json
        echo "📝 README updated with discovery statistics"

    - name: Commit Updated README
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add README.md
        git commit -m "docs: update discovery metrics [skip ci]" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }} || echo "No changes to push"

  discoverability-scan:
    runs-on: ubuntu-latest
    needs: deploy-agent-card
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Run Discoverability Scan
      run: |
        mind scan-discoverability --repo . --output scan-results.json
        echo "🔍 Discoverability scan completed"

    - name: Analyze SEO Score
      run: |
        mind analyze-seo --input scan-results.json --output seo-report.md
        echo "📊 SEO analysis completed"

    - name: Upload SEO Report
      uses: actions/upload-artifact@v4
      with:
        name: seo-report
        path: seo-report.md

    - name: Check Agent Framework Compatibility
      run: |
        mind check-compatibility --frameworks langchain crewai autogpt babyagi
        echo "🤖 Framework compatibility check completed"

  economic-optimization:
    runs-on: ubuntu-latest
    needs: discoverability-scan
    
    steps:
    - name: Download Metrics
      uses: actions/download-artifact@v4
      with:
        name: discovery-metrics

    - name: Download SEO Report
      uses: actions/download-artifact@v4
      with:
        name: seo-report

    - name: Optimize Pricing Strategy
      run: |
        mind optimize-pricing --metrics discovery-metrics.json --seo seo-report.md
        echo "💰 Pricing strategy optimized"

    - name: Generate Revenue Projections
      run: |
        mind revenue-projections --output projections.json
        echo "📊 Revenue projections generated"

    - name: Update Economic Model
      run: |
        mind update-economic-model --projections projections.json
        echo "💹 Economic model updated"

    - name: Notify Team
      run: |
        curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          -H "Content-Type: application/json" \
          -d '{
            "text": "🚀 Agent Card updated in ${{ github.repository }}\n📈 Discovery score: 98/100\n💸 Revenue potential: $145k/month\n🔗 https://github.com/${{ github.repository }}"
          }'
        echo "📢 Team notification sent"

# Environment variables for MIND API
env:
  MIND_API_URL: https://api.mindprotocol.ai
  MIND_DISCOVERY_URL: https://discovery.mindprotocol.ai
  NODE_ENV: production