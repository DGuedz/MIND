{
  "version": "1.0",
  "description": "Policy-triggered runtime events for spec-driven operations.",
  "triggers": [
    {
      "id": "conversation.new_strategic_content",
      "class": "conversation",
      "event_types": ["conversation.message.received"],
      "signal": {
        "any": [
          { "path": "context.tags", "op": "contains_any", "value": ["thesis", "revenue", "pitch", "architecture"] },
          { "path": "context.text", "op": "regex", "value": "(tese|thesis|monetiz|revenue|pitch|arquitetura)" }
        ]
      },
      "policy": {
        "severity": "medium",
        "cooldown_sec": 30,
        "dedupe_key": "conversation:${context.message_id}"
      },
      "actions": ["spec:file", "spec:update-index", "spec:lint-claims"]
    },
    {
      "id": "conversation.sensitive_claim",
      "class": "conversation",
      "event_types": ["conversation.message.received"],
      "signal": {
        "any": [
          { "path": "context.text", "op": "regex", "value": "(garantido|zero slippage|sem risco|institucional|compliance)" },
          { "path": "context.tags", "op": "contains_any", "value": ["sensitive_claim"] }
        ]
      },
      "policy": {
        "severity": "high",
        "cooldown_sec": 60,
        "dedupe_key": "claim:${context.message_id}"
      },
      "actions": ["spec:lint-claims", "spec:request-review"]
    },
    {
      "id": "execution.intent_blocked",
      "class": "execution",
      "event_types": ["intent.policy.checked"],
      "signal": {
        "all": [
          { "path": "context.decision", "op": "equals", "value": "BLOCK" }
        ]
      },
      "policy": {
        "severity": "high",
        "cooldown_sec": 20,
        "dedupe_key": "intent-block:${context.intent_id}"
      },
      "actions": ["spec:append-decision-log", "spec:update-risk-register", "spec:file-execution-learning", "spec:block-similar-intents"]
    },
    {
      "id": "execution.intent_allow_with_proof",
      "class": "execution",
      "event_types": ["intent.policy.checked"],
      "signal": {
        "all": [
          { "path": "context.decision", "op": "equals", "value": "ALLOW" },
          { "path": "context.proof_status", "op": "equals", "value": "verified" }
        ]
      },
      "policy": {
        "severity": "medium",
        "cooldown_sec": 20,
        "dedupe_key": "intent-allow:${context.intent_id}"
      },
      "actions": ["spec:append-decision-log", "spec:file-execution-learning", "spec:update-index"]
    },
    {
      "id": "drift.docs_mismatch",
      "class": "drift",
      "event_types": ["drift.detected"],
      "signal": {
        "any": [
          { "path": "context.drift_types", "op": "contains_any", "value": ["thesis_pitch_mismatch", "claim_without_evidence"] },
          { "path": "context.thesis_pitch_alignment", "op": "equals", "value": "diverged" }
        ]
      },
      "policy": {
        "severity": "high",
        "cooldown_sec": 120,
        "dedupe_key": "drift:${context.drift_id}"
      },
      "actions": ["spec:lint-memory", "spec:request-review", "spec:recompile-dossier"]
    },
    {
      "id": "market.runtime_risk_signal",
      "class": "market",
      "event_types": ["market.runtime.signal"],
      "signal": {
        "any": [
          { "path": "context.latency_ms", "op": "gt", "value": 60000 },
          { "path": "context.route_failure", "op": "equals", "value": true },
          { "path": "context.slippage_bps", "op": "gt", "value": 50 },
          { "path": "context.anchor_timeout", "op": "equals", "value": true },
          { "path": "context.proof_status", "op": "equals", "value": "failed" },
          { "path": "context.fee_capture_bps", "op": "lt", "value": 1 }
        ]
      },
      "policy": {
        "severity": "high",
        "cooldown_sec": 60,
        "dedupe_key": "market:${context.intent_id}"
      },
      "actions": ["spec:update-operational-context", "spec:escalate-risk", "runtime:block-dependent-intents", "notify:ops"]
    }
  ]
}
